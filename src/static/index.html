<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local RAG Agent</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
}
.header {
    padding: 16px 24px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.header h1 {
    font-size: 18px;
    font-weight: 500;
    color: #fff;
}
.status-bar {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #666;
}
.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2ecc71;
    display: inline-block;
    margin-right: 4px;
    vertical-align: middle;
}
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}
.message {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
}
.message.user {
    display: flex;
    justify-content: flex-end;
}
.message.user .bubble {
    background: #1a3a5c;
    color: #c8ddf0;
    border-radius: 16px 16px 4px 16px;
    padding: 12px 16px;
    max-width: 80%;
}
.message.assistant .bubble {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px 16px 16px 4px;
    padding: 16px 20px;
    max-width: 90%;
}
.answer-text {
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
}
.meta {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid #2a2a2a;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 12px;
    color: #666;
}
.meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
}
.faith-badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
}
.faith-high { background: #143d1f; color: #2ecc71; }
.faith-mid { background: #3d3514; color: #f1c40f; }
.faith-low { background: #3d1414; color: #e74c3c; }
.sources-toggle {
    cursor: pointer;
    color: #4a9eff;
    font-size: 12px;
    margin-top: 8px;
    user-select: none;
}
.sources-list {
    display: none;
    margin-top: 8px;
    font-size: 12px;
    color: #888;
    padding-left: 0;
    list-style: none;
}
.sources-list.open { display: block; }
.sources-list li {
    padding: 4px 0;
    border-bottom: 1px solid #1a1a1a;
}
.source-score {
    color: #4a9eff;
    font-weight: 500;
}
.thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #666;
    font-size: 14px;
    max-width: 720px;
    margin: 0 auto;
    padding: 8px 0;
}
.thinking-dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4a9eff;
    animation: dot-pulse 1.4s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
}
.input-area {
    padding: 16px 24px;
    border-top: 1px solid #222;
    background: #0f0f0f;
}
.input-row {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
}
.input-row input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #333;
    border-radius: 12px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
}
.input-row input:focus { border-color: #4a9eff; }
.input-row input::placeholder { color: #555; }
.input-row button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    background: #1a3a5c;
    color: #c8ddf0;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
}
.input-row button:hover { background: #244d73; }
.input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
.welcome {
    max-width: 720px;
    margin: auto;
    text-align: center;
    color: #555;
}
.welcome h2 {
    font-size: 22px;
    font-weight: 500;
    color: #888;
    margin-bottom: 8px;
}
.welcome p {
    font-size: 14px;
    line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
    <h1>Local RAG Agent</h1>
    <div class="status-bar">
        <span><span class="status-dot"></span>Model loaded</span>
        <span id="index-status">Index: loading...</span>
        <span id="web-status"></span>
    </div>
</div>

<div class="chat-container" id="chat">
    <div class="welcome">
        <h2>Ask anything</h2>
        <p>Search your local documents and the web. Answers are verified against source material.</p>
    </div>
</div>

<div class="input-area">
    <div class="input-row">
        <input type="text" id="question" placeholder="Ask a question..." autocomplete="off" />
        <button id="send-btn" onclick="sendQuestion()">Send</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("question");
const sendBtn = document.getElementById("send-btn");

let firstMessage = true;

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !sendBtn.disabled) sendQuestion();
});

async function loadStatus() {
    try {
        const res = await fetch("/api/status");
        const data = await res.json();
        document.getElementById("index-status").textContent = "Index: " + data.index_size + " vectors";
        document.getElementById("web-status").textContent = data.web_search ? "Web search: on" : "Web search: off";
    } catch(e) {}
}

async function sendQuestion() {
    const q = input.value.trim();
    if (!q) return;

    if (firstMessage) {
        chat.querySelector(".welcome")?.remove();
        firstMessage = false;
    }

    addMessage("user", q);
    input.value = "";
    sendBtn.disabled = true;

    const thinkingEl = addThinking();
    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch("/api/query", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({question: q})
        });
        const data = await res.json();
        thinkingEl.remove();
        addAnswer(data);
    } catch(e) {
        thinkingEl.remove();
        addMessage("assistant", "Something went wrong. Make sure the server is running.");
    }

    sendBtn.disabled = false;
    input.focus();
    chat.scrollTop = chat.scrollHeight;
}

function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "message " + role;
    div.innerHTML = '<div class="bubble"><div class="answer-text">' + escapeHtml(text) + '</div></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addThinking() {
    const div = document.createElement("div");
    div.className = "thinking";
    div.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div> Searching and generating...';
    chat.appendChild(div);
    return div;
}

function addAnswer(data) {
    const div = document.createElement("div");
    div.className = "message assistant";

    let faithClass = "faith-high";
    let faithPct = data.faithfulness ? Math.round(data.faithfulness * 100) : 0;
    if (faithPct < 70) faithClass = "faith-low";
    else if (faithPct < 85) faithClass = "faith-mid";

    let sourcesHtml = "";
    if (data.sources && data.sources.length > 0) {
        sourcesHtml = '<ul class="sources-list" id="src-' + Date.now() + '">';
        data.sources.forEach(function(s) {
            sourcesHtml += '<li><span class="source-score">' + Math.round(s.score * 100) + '%</span> ' + escapeHtml(s.file) + '</li>';
        });
        sourcesHtml += '</ul>';
    }

    const srcId = "src-" + Date.now();

    div.innerHTML = '<div class="bubble">' +
        '<div class="answer-text">' + escapeHtml(data.answer) + '</div>' +
        '<div class="meta">' +
            '<div class="meta-item"><span class="faith-badge ' + faithClass + '">' + faithPct + '% verified</span></div>' +
            '<div class="meta-item">' + data.tokens + ' tokens</div>' +
            '<div class="meta-item">' + data.tps + ' tok/s</div>' +
            '<div class="meta-item">' + data.retrieve_time + 's retrieve</div>' +
            '<div class="meta-item">' + data.generate_time + 's generate</div>' +
        '</div>' +
        (data.sources && data.sources.length > 0 ?
            '<div class="sources-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">' +
            data.sources.length + ' sources (click to expand)</div>' + sourcesHtml : '') +
    '</div>';

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
}

loadStatus();
</script>
</body>
</html>
