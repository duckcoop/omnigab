<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local RAG Agent</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
}
.header {
    padding: 16px 24px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.header h1 {
    font-size: 18px;
    font-weight: 500;
    color: #fff;
}
.header-right {
    display: flex;
    align-items: center;
    gap: 16px;
}
.status-bar {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #666;
}
.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2ecc71;
    display: inline-block;
    margin-right: 4px;
    vertical-align: middle;
}
.settings-btn {
    background: none;
    border: 1px solid #333;
    color: #888;
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
}
.settings-btn:hover { border-color: #4a9eff; color: #4a9eff; }
.settings-panel {
    display: none;
    background: #151515;
    border-bottom: 1px solid #222;
    padding: 16px 24px;
}
.settings-panel.open { display: block; }
.settings-inner {
    max-width: 720px;
    margin: 0 auto;
}
.settings-inner h3 {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 12px;
    font-weight: 500;
}
.settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
}
.setting-field label {
    display: block;
    font-size: 11px;
    color: #666;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.setting-field input, .setting-field select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #333;
    border-radius: 8px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 13px;
    outline: none;
}
.setting-field input:focus, .setting-field select:focus { border-color: #4a9eff; }
.instructions-area {
    margin-top: 8px;
}
.instructions-area label {
    display: block;
    font-size: 11px;
    color: #666;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.instruction-list {
    list-style: none;
    padding: 0;
    margin-bottom: 8px;
}
.instruction-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 13px;
}
.instruction-list li .remove-btn {
    background: none;
    border: none;
    color: #e74c3c;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
}
.add-instruction-row {
    display: flex;
    gap: 6px;
}
.add-instruction-row input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #333;
    border-radius: 8px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 13px;
    outline: none;
}
.add-instruction-row button {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    background: #1a3a5c;
    color: #c8ddf0;
    font-size: 13px;
    cursor: pointer;
}
.settings-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: flex-end;
}
.settings-actions button {
    padding: 6px 14px;
    border: 1px solid #333;
    border-radius: 8px;
    background: none;
    color: #888;
    font-size: 12px;
    cursor: pointer;
}
.settings-actions button:hover { border-color: #4a9eff; color: #4a9eff; }
.settings-actions button.danger:hover { border-color: #e74c3c; color: #e74c3c; }
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}
.message {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
}
.message.user {
    display: flex;
    justify-content: flex-end;
}
.message.user .bubble {
    background: #1a3a5c;
    color: #c8ddf0;
    border-radius: 16px 16px 4px 16px;
    padding: 12px 16px;
    max-width: 80%;
}
.message.assistant .bubble {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px 16px 16px 4px;
    padding: 16px 20px;
    max-width: 90%;
}
.message.system {
    display: flex;
    justify-content: center;
}
.message.system .bubble {
    background: #1a2a1a;
    border: 1px solid #2a3a2a;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    color: #7ac77a;
}
.answer-text {
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
}
.meta {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid #2a2a2a;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 12px;
    color: #666;
}
.meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
}
.faith-badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
}
.faith-high { background: #143d1f; color: #2ecc71; }
.faith-mid { background: #3d3514; color: #f1c40f; }
.faith-low { background: #3d1414; color: #e74c3c; }
.sources-toggle {
    cursor: pointer;
    color: #4a9eff;
    font-size: 12px;
    margin-top: 8px;
    user-select: none;
}
.sources-list {
    display: none;
    margin-top: 8px;
    font-size: 12px;
    color: #888;
    padding-left: 0;
    list-style: none;
}
.sources-list.open { display: block; }
.sources-list li {
    padding: 4px 0;
    border-bottom: 1px solid #1a1a1a;
}
.source-score {
    color: #4a9eff;
    font-weight: 500;
}
.thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #666;
    font-size: 14px;
    max-width: 720px;
    margin: 0 auto;
    padding: 8px 0;
}
.thinking-dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4a9eff;
    animation: dot-pulse 1.4s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
}
.input-area {
    padding: 16px 24px;
    border-top: 1px solid #222;
    background: #0f0f0f;
}
.input-row {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
}
.input-row input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #333;
    border-radius: 12px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
}
.input-row input:focus { border-color: #4a9eff; }
.input-row input::placeholder { color: #555; }
.input-row button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    background: #1a3a5c;
    color: #c8ddf0;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
}
.input-row button:hover { background: #244d73; }
.input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
.welcome {
    max-width: 720px;
    margin: auto;
    text-align: center;
    color: #555;
}
.welcome h2 {
    font-size: 22px;
    font-weight: 500;
    color: #888;
    margin-bottom: 8px;
}
.welcome p {
    font-size: 14px;
    line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
    <h1>Local RAG Agent</h1>
    <div class="header-right">
        <div class="status-bar">
            <span><span class="status-dot"></span>Model loaded</span>
            <span id="index-status">Index: loading...</span>
            <span id="web-status"></span>
            <span id="memory-status"></span>
        </div>
        <button class="settings-btn" onclick="toggleSettings()">Settings</button>
    </div>
</div>

<div class="settings-panel" id="settings-panel">
    <div class="settings-inner">
        <h3>Memory &amp; Preferences</h3>
        <div class="settings-grid">
            <div class="setting-field">
                <label>Location</label>
                <input type="text" id="pref-location" placeholder="e.g. Frederick, MD" />
            </div>
            <div class="setting-field">
                <label>Units</label>
                <select id="pref-units">
                    <option value="imperial">Imperial (F, miles, lbs)</option>
                    <option value="metric">Metric (C, km, kg)</option>
                </select>
            </div>
        </div>
        <div class="instructions-area">
            <label>Custom Instructions</label>
            <ul class="instruction-list" id="instruction-list"></ul>
            <div class="add-instruction-row">
                <input type="text" id="new-instruction" placeholder="e.g. Don't use Celsius" />
                <button onclick="addInstruction()">Add</button>
            </div>
        </div>
        <div class="settings-actions">
            <button onclick="saveSettings()">Save</button>
            <button onclick="clearHistory()">Clear History</button>
            <button class="danger" onclick="clearMemory()">Reset Memory</button>
        </div>
    </div>
</div>

<div class="chat-container" id="chat">
    <div class="welcome">
        <h2>Ask anything</h2>
        <p>Search your local documents and the web. Answers are verified against source material.<br>
        Click <strong>Settings</strong> to set your location and preferences.</p>
    </div>
</div>

<div class="input-area">
    <div class="input-row">
        <input type="text" id="question" placeholder="Ask a question..." autocomplete="off" />
        <button id="send-btn" onclick="sendQuestion()">Send</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("question");
const sendBtn = document.getElementById("send-btn");

let firstMessage = true;
let sessionId = null;

async function initSession() {
    try {
        const res = await fetch("/api/session");
        const data = await res.json();
        sessionId = data.session_id;
    } catch(e) {
        sessionId = "default";
    }
}

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !sendBtn.disabled) sendQuestion();
});

document.getElementById("new-instruction").addEventListener("keydown", function(e) {
    if (e.key === "Enter") addInstruction();
});

async function loadStatus() {
    try {
        const res = await fetch("/api/status");
        const data = await res.json();
        document.getElementById("index-status").textContent = "Index: " + data.index_size + " vectors";
        document.getElementById("web-status").textContent = data.web_search ? "Web: on" : "Web: off";
    } catch(e) {}
}

async function loadMemory() {
    try {
        const res = await fetch("/api/memory");
        const data = await res.json();
        document.getElementById("pref-location").value = data.location || "";
        document.getElementById("pref-units").value = data.units || "imperial";

        const loc = data.location;
        document.getElementById("memory-status").textContent = loc ? "Memory: " + loc : "Memory: not set";

        const list = document.getElementById("instruction-list");
        list.innerHTML = "";
        (data.custom_instructions || []).forEach(function(inst) {
            const li = document.createElement("li");
            li.innerHTML = '<span>' + escapeHtml(inst) + '</span><button class="remove-btn" onclick="removeInstruction(this)">&times;</button>';
            li.dataset.instruction = inst;
            list.appendChild(li);
        });
    } catch(e) {}
}

async function saveSettings() {
    const location = document.getElementById("pref-location").value.trim();
    const units = document.getElementById("pref-units").value;

    if (location) {
        await fetch("/api/memory", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({action: "set", key: "location", value: location})
        });
    }

    await fetch("/api/memory", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({action: "set", key: "units", value: units})
    });

    await loadMemory();
    addSystemMessage("Settings saved.");
}

async function addInstruction() {
    const input = document.getElementById("new-instruction");
    const text = input.value.trim();
    if (!text) return;

    await fetch("/api/memory", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({action: "remember", instruction: text})
    });

    input.value = "";
    await loadMemory();
}

async function removeInstruction(btn) {
    const li = btn.parentElement;
    const instruction = li.dataset.instruction;

    await fetch("/api/memory", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({action: "forget", instruction: instruction})
    });

    await loadMemory();
}

async function clearHistory() {
    await fetch("/api/clear_history", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({session_id: sessionId})
    });
    addSystemMessage("Conversation history cleared.");
}

async function clearMemory() {
    if (!confirm("Reset all preferences and instructions?")) return;
    await fetch("/api/memory", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({action: "clear"})
    });
    await loadMemory();
    addSystemMessage("Memory reset.");
}

function toggleSettings() {
    document.getElementById("settings-panel").classList.toggle("open");
}

async function sendQuestion() {
    const q = input.value.trim();
    if (!q) return;

    if (firstMessage) {
        chat.querySelector(".welcome")?.remove();
        firstMessage = false;
    }

    addMessage("user", q);
    input.value = "";
    sendBtn.disabled = true;

    const thinkingEl = addThinking();
    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch("/api/query/stream", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({question: q, session_id: sessionId})
        });

        thinkingEl.remove();

        // Create streaming answer bubble
        const div = document.createElement("div");
        div.className = "message assistant";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        const textEl = document.createElement("div");
        textEl.className = "answer-text";
        bubble.appendChild(textEl);
        div.appendChild(bubble);
        chat.appendChild(div);

        let fullText = "";

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith("data: ")) continue;
                const payload = line.slice(6).trim();
                if (payload === "[DONE]") continue;

                try {
                    const chunk = JSON.parse(payload);
                    if (chunk.type === "token") {
                        fullText += chunk.text;
                        textEl.textContent = fullText;
                        chat.scrollTop = chat.scrollHeight;
                    } else if (chunk.type === "meta") {
                        addMetaToBubble(bubble, chunk);
                    }
                } catch(e) {}
            }
        }
    } catch(e) {
        thinkingEl.remove();
        addMessage("assistant", "Something went wrong. Make sure the server is running.");
    }

    sendBtn.disabled = false;
    input.focus();
    chat.scrollTop = chat.scrollHeight;
}

function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "message " + role;
    div.innerHTML = '<div class="bubble"><div class="answer-text">' + escapeHtml(text) + '</div></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addSystemMessage(text) {
    if (firstMessage) {
        chat.querySelector(".welcome")?.remove();
        firstMessage = false;
    }
    const div = document.createElement("div");
    div.className = "message system";
    div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addThinking() {
    const div = document.createElement("div");
    div.className = "thinking";
    div.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div> Searching and generating...';
    chat.appendChild(div);
    return div;
}

function addMetaToBubble(bubble, data) {
    let faithClass = "faith-high";
    let faithPct = data.faithfulness ? Math.round(data.faithfulness * 100) : 0;
    if (faithPct < 70) faithClass = "faith-low";
    else if (faithPct < 85) faithClass = "faith-mid";

    const metaDiv = document.createElement("div");
    metaDiv.className = "meta";
    metaDiv.innerHTML =
        '<div class="meta-item"><span class="faith-badge ' + faithClass + '">' + faithPct + '% verified</span></div>' +
        '<div class="meta-item">' + (data.tokens || 0) + ' tokens</div>' +
        '<div class="meta-item">' + (data.tps || 0) + ' tok/s</div>' +
        '<div class="meta-item">' + (data.retrieve_time || 0) + 's retrieve</div>' +
        '<div class="meta-item">' + (data.generate_time || 0) + 's generate</div>';
    bubble.appendChild(metaDiv);

    if (data.sources && data.sources.length > 0) {
        let sourcesHtml = '<ul class="sources-list">';
        data.sources.forEach(function(s) {
            sourcesHtml += '<li><span class="source-score">' + Math.round(s.score * 100) + '%</span> ' + escapeHtml(s.file) + '</li>';
        });
        sourcesHtml += '</ul>';

        const toggle = document.createElement("div");
        toggle.className = "sources-toggle";
        toggle.textContent = data.sources.length + ' sources (click to expand)';
        toggle.onclick = function() { this.nextElementSibling.classList.toggle('open'); };
        bubble.appendChild(toggle);

        const srcList = document.createElement("div");
        srcList.innerHTML = sourcesHtml;
        bubble.appendChild(srcList.firstElementChild);
    }
}

function addAnswer(data) {
    const div = document.createElement("div");
    div.className = "message assistant";

    let faithClass = "faith-high";
    let faithPct = data.faithfulness ? Math.round(data.faithfulness * 100) : 0;
    if (faithPct < 70) faithClass = "faith-low";
    else if (faithPct < 85) faithClass = "faith-mid";

    let sourcesHtml = "";
    if (data.sources && data.sources.length > 0) {
        sourcesHtml = '<ul class="sources-list" id="src-' + Date.now() + '">';
        data.sources.forEach(function(s) {
            sourcesHtml += '<li><span class="source-score">' + Math.round(s.score * 100) + '%</span> ' + escapeHtml(s.file) + '</li>';
        });
        sourcesHtml += '</ul>';
    }

    div.innerHTML = '<div class="bubble">' +
        '<div class="answer-text">' + escapeHtml(data.answer) + '</div>' +
        '<div class="meta">' +
            '<div class="meta-item"><span class="faith-badge ' + faithClass + '">' + faithPct + '% verified</span></div>' +
            '<div class="meta-item">' + data.tokens + ' tokens</div>' +
            '<div class="meta-item">' + data.tps + ' tok/s</div>' +
            '<div class="meta-item">' + data.retrieve_time + 's retrieve</div>' +
            '<div class="meta-item">' + data.generate_time + 's generate</div>' +
        '</div>' +
        (data.sources && data.sources.length > 0 ?
            '<div class="sources-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">' +
            data.sources.length + ' sources (click to expand)</div>' + sourcesHtml : '') +
    '</div>';

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
}

initSession();
loadStatus();
loadMemory();
</script>
</body>
</html>
